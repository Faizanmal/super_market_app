name: super_market_helper
description: "Super Market Helper - A comprehensive supermarket inventory and expiry management system"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  
  # State Management
  provider: ^6.1.2
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1
  
  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.4.1
  
  # Notifications
  flutter_local_notifications: ^19.5.0
  firebase_messaging: ^16.1.0
  firebase_core: ^4.3.0
  timezone: ^0.10.1
  
  # Barcode Scanning - GS1-128 Support
  mobile_scanner: ^7.1.4
  google_mlkit_barcode_scanning: ^0.14.1
  
  # OCR - Text Recognition from Images
  google_mlkit_text_recognition: ^0.15.0
  
  # Charts & Analytics
  fl_chart: ^1.1.1
  syncfusion_flutter_charts: ^32.1.19
  
  # Utilities
  intl: ^0.20.2
  path_provider: ^2.1.4
  uuid: ^4.5.1
  shared_preferences: ^2.3.2
  
  # PDF & Excel Export (Reports)
  pdf: ^3.11.1
  printing: ^5.13.2
  excel: ^4.0.6
  
  # API Communication & Security
  dio: ^5.7.0
  http: ^1.2.2
  flutter_secure_storage: ^10.0.0
  crypto: ^3.0.6
  jwt_decoder: ^2.0.1
  
  # WebSocket for real-time updates
  web_socket_channel: ^3.0.1
  socket_io_client: ^3.1.3
  
  # PWA Support
  flutter_web_plugins:
    sdk: flutter
  js: ^0.6.7
  web: ^1.0.0
  
  # Voice Commands
  speech_to_text: ^7.0.0
  flutter_tts: ^4.1.0
  
  # Image Handling
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  image_cropper: ^11.0.0
  file_picker: ^10.3.8
  share_plus: ^12.0.1
  
  # QR Code Generation
  qr_flutter: ^4.1.0
  qr_code_scanner: ^1.0.1
  
  # Biometric Authentication
  local_auth: ^3.0.0
  
  # Pin Code Security
  pinput: ^6.0.1
  
  # Permission Handler
  permission_handler: ^12.0.1
  
  # Firebase Cloud Storage
  firebase_storage: ^13.0.5
  
  # Maps & Location (for store layouts)
  geolocator: ^14.0.2
  google_maps_flutter: ^2.10.0
  
  # Date & Time Pickers
  flutter_datetime_picker_plus: ^2.2.0
  
  # Advanced UI Components
  flutter_slidable: ^4.0.3
  pull_to_refresh: ^2.0.0
  flutter_staggered_grid_view: ^0.7.0
  badges: ^3.1.2
  
  # Network & Connectivity
  connectivity_plus: ^7.0.0
  
  # JSON Serialization
  json_annotation: ^4.9.0
  
  # Logging
  logger: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  
  # Code Generation
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  
  # Testing
  mockito: ^5.4.4
  integration_test:
    sdk: flutter

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

