org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
# Disable Kotlin incremental compilation and daemon to avoid cross-drive cache issues
# (incremental caches may fail when pub cache and project are on different drive letters)
kotlin.incremental=false
# Optionally disable Kotlin daemon to avoid compilation daemon issues on CI/Windows
kotlin.daemon.enabled=false
