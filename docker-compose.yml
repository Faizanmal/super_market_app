# SuperMart Pro - Docker Compose Configuration
# Complete development and production stack

version: '3.9'

services:
  # ===========================================
  # PostgreSQL Database
  # ===========================================
  db:
    image: postgres:15-alpine
    container_name: supermart_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-supermart_db}
      POSTGRES_USER: ${DB_USER:-supermart}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-supermart_secure_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - supermart_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-supermart} -d ${DB_NAME:-supermart_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # Redis Cache & Message Broker
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: supermart_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - supermart_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # Django Backend API
  # ===========================================
  backend:
    build:
      context: ./backend_super_market
      dockerfile: Dockerfile
    container_name: supermart_backend
    restart: unless-stopped
    environment:
      - DJANGO_ENV=${DJANGO_ENV:-development}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - DEBUG=${DEBUG:-True}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=${DB_NAME:-supermart_db}
      - DB_USER=${DB_USER:-supermart}
      - DB_PASSWORD=${DB_PASSWORD:-supermart_secure_password}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8080}
    volumes:
      - ./backend_super_market:/app
      - backend_static:/app/staticfiles
      - backend_media:/app/media
      - backend_logs:/app/logs
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks:
      - supermart_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ===========================================
  # Celery Worker (Background Tasks)
  # ===========================================
  celery_worker:
    build:
      context: ./backend_super_market
      dockerfile: Dockerfile
    container_name: supermart_celery_worker
    restart: unless-stopped
    command: celery -A backend_super_market worker -l info --concurrency=4
    environment:
      - DJANGO_ENV=${DJANGO_ENV:-development}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=${DB_NAME:-supermart_db}
      - DB_USER=${DB_USER:-supermart}
      - DB_PASSWORD=${DB_PASSWORD:-supermart_secure_password}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    volumes:
      - ./backend_super_market:/app
      - backend_logs:/app/logs
    networks:
      - supermart_network
    depends_on:
      - backend
      - redis

  # ===========================================
  # Celery Beat (Task Scheduler)
  # ===========================================
  celery_beat:
    build:
      context: ./backend_super_market
      dockerfile: Dockerfile
    container_name: supermart_celery_beat
    restart: unless-stopped
    command: celery -A backend_super_market beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      - DJANGO_ENV=${DJANGO_ENV:-development}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=${DB_NAME:-supermart_db}
      - DB_USER=${DB_USER:-supermart}
      - DB_PASSWORD=${DB_PASSWORD:-supermart_secure_password}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    volumes:
      - ./backend_super_market:/app
    networks:
      - supermart_network
    depends_on:
      - backend
      - redis

  # ===========================================
  # Flower (Celery Monitoring)
  # ===========================================
  flower:
    build:
      context: ./backend_super_market
      dockerfile: Dockerfile
    container_name: supermart_flower
    restart: unless-stopped
    command: celery -A backend_super_market flower --port=5555 --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-admin}
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    ports:
      - "${FLOWER_PORT:-5555}:5555"
    networks:
      - supermart_network
    depends_on:
      - celery_worker
      - redis

  # ===========================================
  # Nginx Reverse Proxy (Production)
  # ===========================================
  nginx:
    image: nginx:alpine
    container_name: supermart_nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - backend_static:/var/www/static:ro
      - backend_media:/var/www/media:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    networks:
      - supermart_network
    depends_on:
      - backend
    profiles:
      - production

# ===========================================
# Networks
# ===========================================
networks:
  supermart_network:
    driver: bridge
    name: supermart_network

# ===========================================
# Volumes
# ===========================================
volumes:
  postgres_data:
    name: supermart_postgres_data
  redis_data:
    name: supermart_redis_data
  backend_static:
    name: supermart_static
  backend_media:
    name: supermart_media
  backend_logs:
    name: supermart_logs
